
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-box">
  <h2>Investment Service</h2>
  <form onsubmit="submitInvestment(event)">
    <input id="name" placeholder="Name">
    <input id="amount" placeholder="Investment Amount">
    <select id="type">
      <option>Mutual Fund SIP</option>
      <option>Stock Advice</option>
    </select>
    <input id="mobile" placeholder="Mobile">
    <button>Submit</button>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
