<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-box">
  <h2>TDS Return Filing</h2>
  <form onsubmit="submitTDS(event)">
    <input id="name" placeholder="Full Name" required>
    <input id="tan" placeholder="TAN Number" required>
    <input id="amount" placeholder="TDS Amount">
    <input id="quarter" placeholder="Quarter (Q1/Q2)">
    <input id="mobile" placeholder="Mobile">
    <button>Submit</button>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
