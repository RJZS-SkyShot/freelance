<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
  <h2>Form Filling Service</h2>
  <form onsubmit="submitFormFill(event)">
    <input id="name" placeholder="Name" required>
    <input id="formType" placeholder="Form Type (Job/Exam/etc)">
    <textarea id="details" placeholder="Form Details"></textarea>
    <input id="mobile" placeholder="Mobile">
    <button>Submit</button>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
