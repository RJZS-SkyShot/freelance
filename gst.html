<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
  <h2>GST Filing</h2>
  <form onsubmit="submitGST(event)">
    <input id="name" placeholder="Full Name" required>
    <input id="gst" placeholder="GST Number" required>
    <input id="mobile" placeholder="Mobile Number" required>
    <input id="period" placeholder="Filing Period (Month/Year)">
    <button>Submit</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
